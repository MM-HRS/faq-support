<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI FAQ Support (Gemini Free Edition)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
    --accent: #00d4aa; --accent2: #ff6b6b; --accent3: #ffd93d; --text: #e6edf3;
    --text-muted: #8b949e; --user-bubble: #1f4068; --ai-bubble: #1a2f23; --escalate: #3d1a1a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

  /* UI Components */
  .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 2px; }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .sidebar-tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; cursor: pointer; color: var(--text-muted); border: none; background: none; border-bottom: 2px solid transparent; }
  .sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }
  .section-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
  .faq-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; position: relative; }
  .faq-q { font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 4px; padding-right: 40px; }
  .faq-a { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .faq-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
  .faq-btn { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); cursor: pointer; font-size: 10px; padding: 2px 4px; }
  .faq-form { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .faq-form label { font-size: 11px; color: var(--text-muted); display: block; margin-top: 8px; }
  .faq-form input, .faq-form textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px; color: var(--text); font-size: 12px; margin-top: 4px; resize: none; }
  .btn { width: 100%; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; margin-top: 8px; border: 1px solid var(--border); }
  .btn.primary { background: var(--accent); color: #000; border: none; }
  .save-html-btn { width: 100%; padding: 8px; background: none; border: 1px solid var(--accent); border-radius: 6px; color: var(--accent); font-size: 11px; cursor: pointer; margin-top: 8px; }
  
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; background: var(--surface); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .message-wrap { display: flex; gap: 12px; }
  .message-wrap.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .avatar.ai { background: rgba(0,212,170,0.1); color: var(--accent); border: 1px solid var(--accent); }
  .avatar.user { background: rgba(255,107,107,0.1); color: var(--accent2); border: 1px solid var(--accent2); }
  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: 80%; }
  .bubble.ai { background: var(--ai-bubble); border: 1px solid rgba(0,212,170,0.2); }
  .bubble.user { background: var(--user-bubble); }
  .bubble.escalate { background: var(--escalate); border: 1px solid var(--accent2); }
  
  .chat-input-area { padding: 14px 24px; border-top: 1px solid var(--border); background: var(--surface); }
  .input-wrap { display: flex; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
  #userInput { flex: 1; background: none; border: none; color: var(--text); outline: none; resize: none; font-size: 13px; }
  .send-btn { background: var(--accent); border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-weight: 700; }
  
  .history-item { background: var(--surface2); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 11px; }
  .history-time { color: var(--text-muted); font-size: 9px; }
  .confidence-bar { height: 3px; background: #333; margin-top: 8px; border-radius: 2px; }
  .confidence-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .typing-indicator { display: flex; gap: 4px; padding: 8px; }
  .dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: bounce 1s infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">AI SUPPORT (GEMINI)</div>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" onclick="switchTab('faq')">FAQ管理</button>
    <button class="sidebar-tab" onclick="switchTab('history')">履歴</button>
    <button class="sidebar-tab" onclick="switchTab('settings')">設定</button>
  </div>
  <div class="sidebar-content">
    <div id="tab-faq" class="tab-panel active">
      <div class="faq-form">
        <label>質問</label><input type="text" id="newQ">
        <label>回答</label><textarea id="newA"></textarea>
        <button class="btn primary" onclick="addFaq()">+ 追加</button>
      </div>
      <button class="save-html-btn" onclick="saveAsHtml()">💾 HTMLを保存</button>
      <div class="section-label" style="margin-top:16px">登録済みFAQ</div>
      <div id="faqList"></div>
    </div>
    <div id="tab-history" class="tab-panel">
      <div id="historyList"></div>
    </div>
    <div id="tab-settings" class="tab-panel">
      <div class="faq-form">
        <label>Gemini APIキー</label>
        <input type="password" id="inputApiKey" placeholder="AIza...">
        <button class="btn primary" onclick="saveApiKey()">設定保存</button>
        <p style="font-size:10px; color:var(--text-muted); margin-top:10px;">
          取得先: <a href="https://aistudio.google.com/" target="_blank" style="color:var(--accent)">Google AI Studio</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <div class="chat-title">製品AIサポート</div>
    <div style="margin-left:auto; font-size:10px;" id="statusLabel">Gemini 1.5 Flash Active</div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="welcome" id="welcomeMsg">
      <h2>こんにちは！製品についてご案内します。</h2>
    </div>
  </div>
  <div class="chat-input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="質問を入力..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
// ═══ CONFIGURATION ═══
var SUPABASE_URL = "https://qdmdorfyaozszjwtfber.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbWRvcmZ5YW96c3pqd3RmYmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODE4NzgsImV4cCI6MjA4ODM1Nzg3OH0.-dSoLgoLb3RSq4bAh-1gb32Sj-wA6O4RjDW7njuUFJQ";
var _apiKey = "";

// ── FAQ DATA ──
var FAQ_DATA = [
  { id: 1, q: "保証期間は？", a: "購入から1年間です。" },
  { id: 2, q: "納期は？", a: "通常5〜7営業日です。" }
];
var faqs = [...FAQ_DATA];

// ── SUPABASE SAVE ──
async function saveHistoryToSupabase(q, a, conf, esc) {
  try {
    await fetch(SUPABASE_URL + '/rest/v1/history', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ question: q, answer: a, confidence: Number(conf), escalated: Boolean(esc) })
    });
  } catch (e) { console.error("Supabase Error:", e); }
}

// ── SEND MESSAGE (GEMINI) ──
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || !_apiKey) { if(!_apiKey) alert("設定タブでGemini APIキーを入力してください"); return; }

  if(document.getElementById('welcomeMsg')) document.getElementById('welcomeMsg').remove();
  input.value = '';
  appendMessage('user', text);
  showTyping();

  try {
    const faqCtx = faqs.map(f => `Q: ${f.q} A: ${f.a}`).join('\n');
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${_apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: `あなたは製品サポートです。以下のFAQに基づき回答し、最後に必ず {"confidence": 数値, "escalate": 真偽値} の形式のJSONを付けてください。\n\n【FAQ】\n${faqCtx}\n\n質問: ${text}` }] }]
      })
    });

    const data = await response.json();
    const fullText = data.candidates[0].content.parts[0].text;
    
    const jsonMatch = fullText.match(/\{.*?\}/);
    let conf = 70, esc = false;
    if (jsonMatch) {
      try {
        const meta = JSON.parse(jsonMatch[0]);
        conf = meta.confidence; esc = meta.escalate;
      } catch(e) {}
    }
    const cleanAnswer = fullText.replace(/\{.*?\}/, '').trim();

    removeTyping();
    appendMessage('ai', cleanAnswer, conf, esc);
    saveHistoryToSupabase(text, cleanAnswer, conf, esc);
    addToHistoryUI(text, cleanAnswer, conf, esc);
  } catch (e) {
    removeTyping();
    appendMessage('ai', "通信エラー。キーを確認してください。");
  }
}

// ── UTILS ──
function appendMessage(role, content, conf = null, esc = false) {
  const wrap = document.createElement('div');
  wrap.className = `message-wrap ${role}`;
  wrap.innerHTML = `<div class="avatar ${role}">${role==='ai'?'AI':'ME'}</div>
    <div class="bubble ${role} ${esc?'escalate':''}">${content}
    ${conf !== null ? `<div class="confidence-bar"><div class="confidence-fill" style="width:${conf}%; background:${conf>70?'#00d4aa':'#ffd93d'}"></div></div>`:''}
    </div>`;
  document.getElementById('chatMessages').appendChild(wrap);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function showTyping() {
  const t = document.createElement('div');
  t.id = "typing"; t.className = "message-wrap ai";
  t.innerHTML = `<div class="avatar ai">AI</div><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  document.getElementById('chatMessages').appendChild(t);
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function switchTab(t) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${t}`).classList.add('active');
  event.target.classList.add('active');
}

function saveApiKey() { _apiKey = document.getElementById('inputApiKey').value.trim(); alert("保存しました"); }

function addFaq() {
  const q = document.getElementById('newQ').value;
  const a = document.getElementById('newA').value;
  if(!q || !a) return;
  faqs.push({id: Date.now(), q, a});
  document.getElementById('newQ').value = ''; document.getElementById('newA').value = '';
  renderFaqList();
}

function renderFaqList() {
  const container = document.getElementById('faqList');
  container.innerHTML = faqs.map(f => `<div class="faq-item">
    <div class="faq-q">${f.q}</div><div class="faq-a">${f.a}</div>
    <div class="faq-actions"><button class="faq-btn" onclick="deleteFaq(${f.id})">削除</button></div>
  </div>`).join('');
}

function deleteFaq(id) { faqs = faqs.filter(f => f.id !== id); renderFaqList(); }

function addToHistoryUI(q, a, conf, esc) {
  const h = document.getElementById('historyList');
  const item = document.createElement('div');
  item.className = "history-item";
  item.innerHTML = `<div class="history-time">${new Date().toLocaleTimeString()}</div>
    <strong>Q: ${q}</strong><br>A: ${a.substring(0,30)}...<br>信頼度: ${conf}%`;
  h.prepend(item);
}

function saveAsHtml() {
  let html = document.documentElement.outerHTML;
  const faqJson = JSON.stringify(faqs);
  html = html.replace(/var FAQ_DATA = \[.*?\];/, `var FAQ_DATA = ${faqJson};`);
  const blob = new Blob([html], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = "ai-support.html"; a.click();
}

renderFaqList();
</script>
</body>
</html>
